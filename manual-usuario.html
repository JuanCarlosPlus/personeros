<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manual Interactivo — Sistema de Personeros 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#1e293b;background:#f8fafc;line-height:1.6}

/* Navigation bar */
.topnav{background:#1e3a5f;color:#fff;padding:0.5rem 1rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:300;flex-wrap:wrap}
.topnav-title{font-weight:700;font-size:0.9rem;margin-right:auto;white-space:nowrap}
.topnav button{background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:6px;padding:0.35rem 0.7rem;font-size:0.78rem;cursor:pointer;white-space:nowrap}
.topnav button:hover{background:rgba(255,255,255,0.25)}
.topnav button.active{background:#2563eb}
.topnav .sep{color:rgba(255,255,255,0.3);font-size:0.8rem}

/* Manual text */
.manual-section{display:none;max-width:960px;margin:0 auto;padding:1.5rem}
.manual-section.active{display:block}
.doc-title{font-size:1.4rem;color:#1e3a5f;margin-bottom:0.5rem;border-bottom:2px solid #2563eb;padding-bottom:0.4rem}
.doc-text{margin-bottom:0.75rem;font-size:0.9rem}
.doc-step{background:#f8fafc;border-left:4px solid #2563eb;padding:0.6rem 1rem;margin:0.6rem 0;border-radius:0 6px 6px 0;font-size:0.9rem}
.doc-step b{background:#2563eb;color:#fff;display:inline-block;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:0.75rem;margin-right:0.4rem}
.doc-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:0.6rem 0.8rem;margin:0.75rem 0;font-size:0.85rem}
.doc-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:0.6rem 0.8rem;margin:0.75rem 0;font-size:0.85rem}
.doc-table{width:100%;border-collapse:collapse;font-size:0.85rem;margin:0.5rem 0}
.doc-table th{background:#f1f5f9;text-align:left;padding:0.4rem 0.6rem;border:1px solid #e2e8f0;font-weight:600;color:#475569}
.doc-table td{padding:0.4rem 0.6rem;border:1px solid #e2e8f0}
.badge{display:inline-block;padding:0.1rem 0.4rem;border-radius:8px;font-size:0.75rem;font-weight:500}
.badge-b{background:#dbeafe;color:#1d4ed8}.badge-g{background:#dcfce7;color:#16a34a}.badge-a{background:#fef3c7;color:#d97706}.badge-p{background:#f3e8ff;color:#7c3aed}.badge-gr{background:#f1f5f9;color:#64748b}

/* Interactive demo frame */
.demo-frame{border:2px solid #2563eb;border-radius:12px;overflow:hidden;margin:1rem 0;box-shadow:0 4px 20px rgba(37,99,235,0.15)}
.demo-header{background:#2563eb;color:#fff;padding:0.4rem 0.8rem;font-size:0.78rem;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.demo-body{background:#f1f5f9;min-height:300px;position:relative}

/* Reusable UI */
.sim-page{min-height:400px;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.sim-page.gradient{background:linear-gradient(135deg,#1e3a5f 0%,#0f2440 100%)}
.sim-card{background:#fff;border-radius:12px;padding:1.5rem;width:380px;max-width:100%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.12)}
.sim-field{margin-bottom:0.75rem;text-align:left}
.sim-label{display:block;font-size:0.78rem;font-weight:600;color:#475569;margin-bottom:0.2rem}
.sim-input{width:100%;padding:0.5rem;border:1.5px solid #e2e8f0;border-radius:6px;font-size:0.88rem;outline:none;box-sizing:border-box;font-family:inherit}
.sim-input:focus{border-color:#2563eb}
.sim-btn{width:100%;padding:0.6rem;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border:none;border-radius:6px;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:0.3rem}
.sim-btn:disabled{opacity:0.5;cursor:default}
.sim-btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem;border-radius:6px;border:none;cursor:pointer;font-weight:600}
.sim-error{background:#fef2f2;color:#dc2626;border-radius:6px;padding:0.4rem 0.6rem;font-size:0.82rem;margin-bottom:0.5rem}
.sim-success{background:#f0fdf4;color:#16a34a;border-radius:6px;padding:0.4rem 0.6rem;font-size:0.82rem;margin-bottom:0.5rem}

/* Layout sim */
.sim-layout{display:flex;min-height:450px}
.sim-sidebar{width:200px;background:linear-gradient(180deg,#1e3a5f 0%,#0f2440 100%);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sim-sidebar.dir{background:linear-gradient(180deg,#1a365d 0%,#0c1f3a 100%)}
.sim-sb-header{padding:0.8rem;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:700;font-size:0.85rem;white-space:nowrap}
.sim-sb-nav{flex:1;padding:0.5rem 0.3rem;display:flex;flex-direction:column;gap:0.15rem}
.sim-sb-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.6rem;background:transparent;border:none;color:rgba(255,255,255,0.7);border-radius:6px;font-size:0.8rem;text-align:left;width:100%;cursor:pointer;white-space:nowrap;font-family:inherit}
.sim-sb-item:hover{background:rgba(255,255,255,0.1)}
.sim-sb-item.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600}
.sim-sb-footer{padding:0.6rem;border-top:1px solid rgba(255,255,255,0.1);font-size:0.75rem}
.sim-sb-footer .name{font-weight:600;font-size:0.8rem}
.sim-sb-footer .role{color:rgba(255,255,255,0.5);font-size:0.7rem}
.sim-main{flex:1;overflow:auto}
.sim-topbar{background:#fff;padding:0.5rem 1rem;border-bottom:1px solid #e2e8f0;font-size:0.82rem;color:#64748b;display:flex;align-items:center;gap:0.5rem}
.sim-content{padding:1rem}
.sim-content h3{font-size:1.1rem;color:#1e293b;margin-bottom:0.75rem}

/* Table sim */
.sim-tw{overflow-x:auto;border:1px solid #e2e8f0;border-radius:8px;background:#fff}
.sim-t{width:100%;border-collapse:collapse;font-size:0.8rem}
.sim-t th{background:#f8fafc;padding:0.45rem 0.5rem;border-bottom:2px solid #e2e8f0;text-align:left;font-size:0.75rem;font-weight:600;color:#475569;white-space:nowrap}
.sim-t td{padding:0.4rem 0.5rem;border-bottom:1px solid #f1f5f9}
.sim-t input{width:100%;border:none;outline:none;padding:0.3rem;font-size:0.8rem;background:transparent;font-family:inherit;box-sizing:border-box}
.sim-t input:focus{background:#eff6ff}

/* Modal sim */
.sim-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:10}
.sim-modal{background:#fff;border-radius:10px;padding:1.25rem;width:440px;max-width:90%;max-height:90%;overflow:auto}
.sim-modal h4{margin:0 0 0.75rem;font-size:1rem;color:#1e293b}
.sim-modal .row{display:flex;gap:0.5rem;margin-bottom:0.5rem}
.sim-modal .row>div{flex:1}

/* Stats */
.sim-stats{display:flex;gap:0.75rem;flex-wrap:wrap;margin:0.75rem 0}
.sim-stat{flex:1;min-width:100px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem;text-align:center}
.sim-stat .num{font-size:1.5rem;font-weight:700;color:#1e293b}
.sim-stat .lbl{font-size:0.72rem;color:#64748b;margin-top:0.15rem}

/* Link card */
.sim-linkcard{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:0.75rem;margin:0.75rem 0;font-size:0.82rem}
.sim-linkcard code{background:#fff;padding:0.2rem 0.4rem;border-radius:4px;font-size:0.78rem;word-break:break-all;border:1px solid #e2e8f0}

/* Step indicator */
.sim-steps{display:flex;justify-content:center;gap:0.4rem;margin-bottom:1rem}
.sim-step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}
.sim-step-line{width:20px;height:2px;align-self:center}

/* Invite box */
.sim-invite{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:0.6rem;font-size:0.85rem;color:#1e40af;margin-bottom:1rem}

/* Toast */
.sim-toast{position:absolute;top:8px;right:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:0.4rem 0.8rem;border-radius:6px;font-size:0.8rem;font-weight:500;z-index:20;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topnav" id="topnav">
  <span class="topnav-title">🗳️ Manual Interactivo — Personeros 2026</span>
</div>

<!-- All sections rendered by JS below -->
<div id="app"></div>

<script>
// =============================================
// SIMULATED DATA
// =============================================
const RENIEC={
  '12345678':{nombres:'JUAN CARLOS',ap:'GARCIA',am:'LOPEZ'},
  '87654321':{nombres:'MARIA ELENA',ap:'RODRIGUEZ',am:'SILVA'},
  '45678901':{nombres:'PEDRO ANTONIO',ap:'MARTINEZ',am:'TORRES'},
  '11223344':{nombres:'ANA LUCIA',ap:'FERNANDEZ',am:'DIAZ'},
  '55667788':{nombres:'CARLOS ALBERTO',ap:'QUISPE',am:'HUAMAN'},
  '99887766':{nombres:'ROSA MARIA',ap:'CHAVEZ',am:'MENDOZA'},
  '22334455':{nombres:'LUIS MIGUEL',ap:'VARGAS',am:'CASTILLO'},
  '66778899':{nombres:'CARMEN JULIA',ap:'SANCHEZ',am:'FLORES'},
};
const FN=['JOSE','MARIA','CARLOS','ANA','LUIS','ROSA','PEDRO','JULIA','MIGUEL','CARMEN','ROBERTO','PATRICIA'];
const LN=['GARCIA','RODRIGUEZ','MARTINEZ','LOPEZ','GONZALEZ','HERNANDEZ','PEREZ','SANCHEZ','RAMIREZ','TORRES','FLORES','MORALES'];
function fakeReniec(d){const s=parseInt(d)||0;return{nombres:FN[s%FN.length]+' '+FN[(s*3+7)%FN.length],ap:LN[(s*2+5)%LN.length],am:LN[(s*4+11)%LN.length]};}
function lookupDni(d){return RENIEC[d]||fakeReniec(d);}

// State
const state={
  cargos:[],
  directivos:[],
  personeros:[],
  invitaciones:[],
  mensajes:[],
};

const PERMISOS=[
  {key:'directivos:crear',label:'Registrar sub-directivos'},
  {key:'directivos:ver',label:'Ver directivos'},
  {key:'personeros:invitar',label:'Invitar personeros'},
  {key:'personeros:ver',label:'Ver personeros'},
  {key:'personeros:asignar',label:'Asignar personeros a mesas'},
  {key:'dashboard:ver',label:'Ver dashboard'},
  {key:'reportes:exportar',label:'Exportar datos'},
  {key:'sistema:configurar',label:'Configurar sistema'},
];

let idCounter=1;
function uid(){return 'id_'+(idCounter++);}

// =============================================
// SECTIONS DEFINITION
// =============================================
const sections=[
  {id:'login',group:'Admin',label:'Login Admin',render:renderLoginAdmin},
  {id:'dashboard',group:'Admin',label:'Dashboard',render:renderDashboard},
  {id:'personeros',group:'Admin',label:'Personeros',render:renderPersoneroList},
  {id:'masivo',group:'Admin',label:'Registro Masivo',render:renderRegistroMasivo},
  {id:'cargos',group:'Admin',label:'Cargos',render:renderCargos},
  {id:'directivos',group:'Admin',label:'Directivos',render:renderDirectivos},
  {id:'dir-login',group:'Directivo',label:'Login Directivo',render:renderDirectivoLogin},
  {id:'dir-dash',group:'Directivo',label:'Dashboard Dir.',render:renderDirectivoDash},
  {id:'dir-invitar',group:'Directivo',label:'Invitar',render:renderInvitar},
  {id:'autoregistro',group:'Personero',label:'Auto-registro',render:renderAutoRegistro},
  {id:'mapa',group:'Nuevas',label:'Mapa de Calor',render:renderMapaCalor},
  {id:'chat',group:'Nuevas',label:'Chat Interno',render:renderChatInterno},
  {id:'reportes',group:'Nuevas',label:'Reportes',render:renderReportes},
  {id:'movil',group:'Nuevas',label:'App Movil',render:renderAppMovil},
];

let currentSection='login';

function navigate(id){
  currentSection=id;
  renderAll();
}

function renderNav(){
  const nav=document.getElementById('topnav');
  let html='<span class="topnav-title">🗳️ Manual Interactivo — Personeros 2026</span>';
  let lastGroup='';
  sections.forEach(s=>{
    if(s.group!==lastGroup){
      if(lastGroup) html+='<span class="sep">|</span>';
      lastGroup=s.group;
    }
    html+=`<button class="${currentSection===s.id?'active':''}" onclick="navigate('${s.id}')">${s.label}</button>`;
  });
  nav.innerHTML=html;
}

function renderAll(){
  renderNav();
  const app=document.getElementById('app');
  let html='';
  sections.forEach(s=>{
    html+=`<div class="manual-section ${currentSection===s.id?'active':''}" id="sec-${s.id}"></div>`;
  });
  app.innerHTML=html;
  const sec=document.getElementById('sec-'+currentSection);
  if(sec){
    const s=sections.find(x=>x.id===currentSection);
    if(s) s.render(sec);
  }
}

// =============================================
// HELPERS
// =============================================
function h(tag,attrs,children){
  let a='';
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object'){a+=` style="${Object.entries(v).map(([p,val])=>p.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())+':'+val).join(';')}"`}else if(k.startsWith('on')){}else{a+=` ${k}="${v}"`}});
  const c=Array.isArray(children)?children.join(''):children||'';
  if(['input','br','hr','img'].includes(tag))return`<${tag}${a}/>`;
  return`<${tag}${a}>${c}</${tag}>`;
}

function toast(container,msg){
  const t=document.createElement('div');
  t.className='sim-toast';
  t.textContent=msg;
  container.style.position='relative';
  container.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// =============================================
// 1. LOGIN ADMIN
// =============================================
function renderLoginAdmin(el){
  el.innerHTML=`
  <h2 class="doc-title">1. Inicio de Sesion — Administrador</h2>
  <p class="doc-text">El administrador ingresa al sistema con su usuario y contrasena. Pruebe la demo a continuacion:</p>
  <div class="doc-step"><b>1</b> Escriba <strong>admin</strong> como usuario y <strong>admin</strong> como contrasena.</div>
  <div class="doc-step"><b>2</b> Presione <strong>"Ingresar"</strong>. Sera redirigido al Dashboard.</div>
  <div class="doc-note">💡 En la parte inferior hay un enlace al portal de directivos para dirigentes del partido.</div>

  <div class="demo-frame">
    <div class="demo-header"><span>DEMO INTERACTIVA</span><span>Pantalla: /login</span></div>
    <div class="demo-body">
      <div class="sim-page gradient">
        <div class="sim-card">
          <div style="font-size:2.5rem;margin-bottom:0.3rem">🗳️</div>
          <h3 style="color:#1e3a5f;margin-bottom:0.15rem">Sistema de Personeros</h3>
          <p style="color:#64748b;font-size:0.85rem;margin-bottom:1.25rem">Elecciones 2026</p>
          <div class="sim-field">
            <label class="sim-label">Usuario</label>
            <input class="sim-input" id="login-user" placeholder="administrador" value="admin"/>
          </div>
          <div class="sim-field">
            <label class="sim-label">Contrasena</label>
            <input class="sim-input" id="login-pass" type="password" placeholder="••••••••" value="admin"/>
          </div>
          <div id="login-error" style="display:none" class="sim-error"></div>
          <button class="sim-btn" id="login-btn" onclick="doAdminLogin()">Ingresar</button>
          <a href="javascript:navigate('dir-login')" style="display:inline-block;margin-top:1rem;font-size:0.78rem;color:#64748b;text-decoration:none">Acceso para directivos del partido</a>
        </div>
      </div>
    </div>
  </div>`;
}
function doAdminLogin(){
  const u=document.getElementById('login-user').value;
  const p=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  if(u==='admin'&&p==='admin'){
    err.style.display='none';
    navigate('dashboard');
  } else {
    err.style.display='block';
    err.textContent='Usuario o contrasena incorrectos. Pruebe admin/admin';
  }
}

// =============================================
// 2. DASHBOARD
// =============================================
function renderDashboard(el){
  const regions=[
    {name:'AMAZONAS',mesas:412,asignadas:189,pct:45.9},
    {name:'ANCASH',mesas:1834,asignadas:921,pct:50.2},
    {name:'APURIMAC',mesas:583,asignadas:312,pct:53.5},
    {name:'AREQUIPA',mesas:2105,asignadas:1473,pct:70.0},
    {name:'AYACUCHO',mesas:789,asignadas:394,pct:49.9},
    {name:'CAJAMARCA',mesas:1923,asignadas:865,pct:45.0},
    {name:'CALLAO',mesas:1456,asignadas:1092,pct:75.0},
    {name:'CUSCO',mesas:1678,asignadas:1007,pct:60.0},
    {name:'HUANCAVELICA',mesas:534,asignadas:214,pct:40.1},
    {name:'HUANUCO',mesas:945,asignadas:472,pct:50.0},
    {name:'ICA',mesas:1123,asignadas:786,pct:70.0},
    {name:'JUNIN',mesas:1567,asignadas:940,pct:60.0},
    {name:'LA LIBERTAD',mesas:2345,asignadas:1641,pct:70.0},
    {name:'LAMBAYEQUE',mesas:1678,asignadas:1175,pct:70.0},
    {name:'LIMA',mesas:12456,asignadas:8719,pct:70.0},
  ];

  let cards='';
  regions.forEach(r=>{
    const color=r.pct>=70?'#16a34a':r.pct>=50?'#d97706':'#dc2626';
    cards+=`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem;cursor:pointer" onclick="toast(this.closest('.demo-body'),'Navegaria a ${r.name}')">
      <div style="font-weight:600;font-size:0.85rem;margin-bottom:0.4rem">${r.name}</div>

        ${adminSidebar('dashboard')}

          <div class="sim-topbar">📊 Dashboard › <strong>Nacional</strong></div>
          <div class="sim-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem">

              ${cards}

          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function adminSidebar(active){
  const items=[
    {icon:'📊',label:'Dashboard',id:'dashboard'},
    {icon:'👥',label:'Personeros',id:'personeros'},
    {icon:'📋',label:'Registro Masivo',id:'masivo'},
    {icon:'🏛️',label:'Cargos',id:'cargos'},
    {icon:'👔',label:'Directivos',id:'directivos'},
  ];
  let nav='';
  items.forEach(i=>{
    nav+=`<button class="sim-sb-item ${active===i.id?'active':''}" onclick="navigate('${i.id}')">${i.icon} ${i.label}</button>`;
  });
  return `<div class="sim-sidebar">
    <div class="sim-sb-header">🗳️ Personeros 2026</div>
    <div class="sim-sb-nav">${nav}</div>
    <div class="sim-sb-footer"><div class="name">Administrador</div><div class="role">admin</div></div>
  </div>`;
}

// =============================================
// 3. PERSONERO LIST
// =============================================
function renderPersoneroList(el){
  if(state.personeros.length===0){
    // Seed some demo personeros

let masRows=[];
const masSaved=new Set();
function initMasRows(){masRows=[];for(let i=0;i<8;i++)masRows.push({dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''});}
initMasRows();

function renderRegistroMasivo(el){
  el.innerHTML=`
  <h2 class="doc-title">4. Registro Masivo de Personeros</h2>
  <p class="doc-text">Registre multiples personeros en una tabla estilo Excel. Escriba el DNI y presione <strong>Enter</strong> para consultar RENIEC.</p>
  <div class="doc-step"><b>1</b> Escriba un DNI de 8 digitos y presione <strong>Enter</strong>.</div>
  <div class="doc-step"><b>2</b> Los nombres se llenan automaticamente. Complete el <strong>Celular</strong>.</div>
  <div class="doc-step"><b>3</b> Use <strong>Tab/Enter</strong> para navegar. Repita para cada personero.</div>
  <div class="doc-step"><b>4</b> Presione <strong>"AGREGAR PERSONEROS"</strong> para guardar.</div>

  <div class="demo-frame">
    <div class="demo-header"><span>DEMO INTERACTIVA</span><span>Pantalla: /personeros/registro-masivo</span></div>

          <div class="sim-content" id="mas-content"></div>
        </div>
      </div>
    </div>
  </div>`;
  renderMasContent();
}

function renderMasContent(){
  const c=document.getElementById('mas-content');if(!c)return;
  const valid=masRows.filter(r=>/^\d{8}$/.test(r.dni)&&r.tel.length>=9&&r.status!=='exists'&&r.status!=='saved');
  const statusColors={ok:'#16a34a',saved:'#16a34a',exists:'#d97706',error:'#dc2626',loading:'#2563eb'};
  const rowBgs={ok:'#f0fdf4',saved:'#f0fdf4',exists:'#fffbeb',error:'#fef2f2',loading:'#eff6ff'};
  let rows='';
  masRows.forEach((r,i)=>{
    rows+=`<tr style="background:${rowBgs[r.status]||'transparent'}">
      <td style="text-align:center;color:#94a3b8;font-size:0.75rem;padding:0.3rem">${i+1}</td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="dni" value="${r.dni}" maxlength="8" placeholder="12345678" ${r.status==='saved'?'disabled':''}/></td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="nombres" value="${r.nombres}" placeholder="Nombres" ${r.status==='saved'?'disabled':''}/></td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="ap" value="${r.ap}" placeholder="Ap. Paterno" ${r.status==='saved'?'disabled':''}/></td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="am" value="${r.am}" placeholder="Ap. Materno" ${r.status==='saved'?'disabled':''}/></td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="tel" value="${r.tel}" placeholder="999999999" ${r.status==='saved'?'disabled':''}/></td>
      <td><input class="sim-t input" data-mi="${i}" data-mc="correo" value="${r.correo}" placeholder="correo@ej.com" ${r.status==='saved'?'disabled':''}/></td>
      <td style="font-size:0.75rem;font-weight:500;color:${statusColors[r.status]||'#94a3b8'};white-space:nowrap;padding:0.3rem">${r.status==='loading'?'⏳ ':''}${r.msg}</td>
      <td>${r.dni&&r.status!=='saved'?'<button style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:1rem" onclick="masRemove('+i+')">×</button>':''}</td>
    </tr>`;
  });
  c.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;flex-wrap:wrap;gap:0.5rem">
      <h3 style="margin:0">Registro Masivo de Personeros</h3>
      <div style="display:flex;gap:0.5rem">
        <button class="sim-btn-sm" style="background:#f1f5f9;color:#475569;border:1px solid #cbd5e1" onclick="initMasRows();renderMasContent()">Limpiar todo</button>
        <button class="sim-btn-sm" style="background:#2563eb;color:#fff;opacity:${valid.length?1:0.5}" ${valid.length?'':'disabled'} onclick="masSave()">AGREGAR PERSONEROS (${valid.length})</button>
      </div>
    </div>
    <div id="mas-result"></div>
    <div class="sim-tw"><table class="sim-t"><thead><tr>
      <th style="width:30px">#</th><th style="width:100px">DNI</th><th>Nombres</th><th>Ap. Paterno</th><th>Ap. Materno</th><th style="width:100px">Celular *</th><th>Correo</th><th style="width:100px">Estado</th><th style="width:25px"></th>
    </tr></thead><tbody>${rows}</tbody></table></div>
    <p style="font-size:0.75rem;color:#64748b;margin-top:0.5rem">Escriba el DNI y presione <strong>Enter</strong> para consultar. Use Tab para navegar.</p>`;
  // Bind events
  c.querySelectorAll('input[data-mi]').forEach(inp=>{
    const i=parseInt(inp.dataset.mi),col=inp.dataset.mc;
    inp.addEventListener('input',()=>{
      if(col==='dni')masRows[i].dni=inp.value.replace(/\D/g,'');
      else if(col==='tel')masRows[i].tel=inp.value.replace(/\D/g,'');
      else masRows[i][col]=inp.value;
      if(col==='dni'){masRows[i].status='';masRows[i].msg='';}
    });
    inp.addEventListener('keydown',e=>{
      if(col==='dni'&&e.key==='Enter'){e.preventDefault();masLookup(i);return;}
      if(e.key==='Enter'||e.key==='Tab'&&!e.shiftKey){
        e.preventDefault();
        const cols=['dni','nombres','ap','am','tel','correo'];
        const ci=cols.indexOf(col);
        if(ci<cols.length-1){
          const next=c.querySelector(`input[data-mi="${i}"][data-mc="${cols[ci+1]}"]`);
          next?.focus();
        } else {
          if(i>=masRows.length-2){masRows.push({dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''},{dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''});renderMasContent();}
          setTimeout(()=>{const next=c.querySelector(`input[data-mi="${i+1}"][data-mc="dni"]`);next?.focus();},50);
        }
      }
    });
  });
}

function masLookup(i){
  const d=masRows[i].dni;
  if(!/^\d{8}$/.test(d)){masRows[i].status='error';masRows[i].msg='DNI: 8 digitos';renderMasContent();return;}
  const dup=masRows.findIndex((r,j)=>j!==i&&r.dni===d);
  if(dup>=0){masRows[i].status='error';masRows[i].msg='Duplicado (fila '+(dup+1)+')';renderMasContent();return;}
  if(masSaved.has(d)){masRows[i].status='exists';masRows[i].msg='Ya registrado';const r=lookupDni(d);masRows[i].nombres=r.nombres;masRows[i].ap=r.ap;masRows[i].am=r.am;renderMasContent();return;}
  masRows[i].status='loading';masRows[i].msg='Consultando...';renderMasContent();
  setTimeout(()=>{
    const r=lookupDni(d);masRows[i].nombres=r.nombres;masRows[i].ap=r.ap;masRows[i].am=r.am;masRows[i].status='ok';masRows[i].msg='RENIEC OK';
    if(i>=masRows.length-2)masRows.push({dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''},{dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''});
    renderMasContent();
    setTimeout(()=>{const el=document.querySelector(`input[data-mi="${i}"][data-mc="tel"]`);el?.focus();},50);
  },500);
}
function masRemove(i){masRows.splice(i,1);if(masRows.length<3)masRows.push({dni:'',nombres:'',ap:'',am:'',tel:'',correo:'',status:'',msg:''});renderMasContent();}
function masSave(){
  let created=0;
  masRows.forEach(r=>{
    if(/^\d{8}$/.test(r.dni)&&r.tel.length>=9&&r.status!=='exists'&&r.status!=='saved'){
      masSaved.add(r.dni);r.status='saved';r.msg='Creado ✓';created++;
      if(!state.personeros.find(p=>p.dni===r.dni)){
        state.personeros.push({_id:uid(),dni:r.dni,nombres:r.nombres,apellidoPaterno:r.ap,apellidoMaterno:r.am,telefono:r.tel,correo:r.correo,assignmentStatus:'pendiente',assignedMesa:null});
      }
    }
  });
  renderMasContent();
  const res=document.getElementById('mas-result');
  if(res)res.innerHTML=`<div class="sim-success" style="margin-bottom:0.5rem">${created} creado${created!==1?'s':''}</div>`;
}

  // Render modal if open
  if(cargoModal){
    const overlay=document.createElement('div');overlay.className='sim-overlay';
    const permChecks=PERMISOS.map(p=>`<label style="display:flex;align-items:center;gap:0.3rem;font-size:0.78rem;cursor:pointer">
      <input type="checkbox" class="cargo-perm" value="${p.key}" ${(cargoModal.permisos||[]).includes(p.key)?'checked':''}/>${p.label}

function cargoSeed(){
  const defaults=[
    {nombre:'Presidente del Partido',nivel:1,permisos:PERMISOS.map(p=>p.key)},
    {nombre:'Secretario General',nivel:2,permisos:['directivos:crear','directivos:ver','personeros:invitar','personeros:ver','personeros:asignar','dashboard:ver','reportes:exportar']},
    {nombre:'Coordinador General',nivel:3,permisos:['directivos:crear','directivos:ver','personeros:invitar','personeros:ver','personeros:asignar','dashboard:ver','reportes:exportar']},
    {nombre:'Coordinador Regional',nivel:4,permisos:['directivos:crear','directivos:ver','personeros:invitar','personeros:ver','dashboard:ver']},
    {nombre:'Coordinador Distrital',nivel:5,permisos:['directivos:crear','directivos:ver','personeros:invitar','personeros:ver','dashboard:ver']},
    {nombre:'Coord. Centro de Votacion',nivel:6,permisos:['personeros:invitar','personeros:ver','dashboard:ver']},
  ];
  defaults.forEach(d=>{if(!state.cargos.find(c=>c.nombre===d.nombre))state.cargos.push({_id:uid(),...d});});
  renderCargosContent();toast(document.getElementById('cargos-body'),'6 cargos creados');
}
function cargoNew(){cargoModal={nombre:'',nivel:'',permisos:[]};renderCargosContent();}
function cargoEdit(id){const c=state.cargos.find(x=>x._id===id);if(c)cargoModal={...c,permisos:[...(c.permisos||[])]};renderCargosContent();}
function cargoDel(id){state.cargos=state.cargos.filter(c=>c._id!==id);renderCargosContent();toast(document.getElementById('cargos-body'),'Cargo eliminado');}
function cargoSave(){
  const n=document.getElementById('cargo-nombre').value;
  const nv=parseInt(document.getElementById('cargo-nivel').value);
  const perms=Array.from(document.querySelectorAll('.cargo-perm:checked')).map(cb=>cb.value);
  if(!n||!nv){alert('Nombre y nivel requeridos');return;}
  if(cargoModal._id){const c=state.cargos.find(x=>x._id===cargoModal._id);if(c){c.nombre=n;c.nivel=nv;c.permisos=perms;}}
  else{state.cargos.push({_id:uid(),nombre:n,nivel:nv,permisos:perms});}
  cargoModal=null;renderCargosContent();toast(document.getElementById('cargos-body'),'Cargo guardado');
}

function dirNew(){if(state.cargos.length===0){alert('Primero cree cargos en la seccion Cargos');return;}dirModal={dni:'',nombres:'',ap:'',am:'',telefono:'',correo:'',cargoId:'',region:''};renderDirContent();}
function dirEdit(id){const d=state.directivos.find(x=>x._id===id);if(d)dirModal={...d};renderDirContent();}
function dirDel(id){state.directivos=state.directivos.filter(d=>d._id!==id);renderDirContent();toast(document.getElementById('dir-body'),'Directivo eliminado');}
function dirLookup(){
  const dni=document.getElementById('dir-dni').value.replace(/\D/g,'');
  if(!/^\d{8}$/.test(dni)){document.getElementById('dir-dni-status').innerHTML='<span style="color:#dc2626">8 digitos</span>';return;}
  document.getElementById('dir-dni-status').innerHTML='<span style="color:#2563eb">⏳</span>';
  setTimeout(()=>{
    const r=lookupDni(dni);
    document.getElementById('dir-nombres').value=r.nombres;
    document.getElementById('dir-ap').value=r.ap;
    document.getElementById('dir-am').value=r.am;
    document.getElementById('dir-dni-status').innerHTML='<span style="color:#16a34a">✓ OK</span>';
    dirModal.nombres=r.nombres;dirModal.ap=r.ap;dirModal.am=r.am;dirModal.dni=dni;
  },400);
}
function dirSave(){
  const dni=document.getElementById('dir-dni').value;
  const nombres=document.getElementById('dir-nombres').value;
  const ap=document.getElementById('dir-ap').value;
  const am=document.getElementById('dir-am').value;
  const tel=document.getElementById('dir-tel').value;
  const correo=document.getElementById('dir-correo').value;
  const cargoId=document.getElementById('dir-cargo').value;
  const region=document.getElementById('dir-region').value;
  const pass=document.getElementById('dir-pass').value;
  if(!dni||!nombres||!ap||!cargoId){alert('DNI, nombres, apellido y cargo son requeridos');return;}
  if(!dirModal._id&&(!pass||pass.length<4)){alert('Contrasena minimo 4 caracteres');return;}
  if(dirModal._id){const d=state.directivos.find(x=>x._id===dirModal._id);if(d){d.nombres=nombres;d.ap=ap;d.am=am;d.telefono=tel;d.correo=correo;d.cargoId=cargoId;d.region=region;}}
  else{const lc=Math.random().toString(36).slice(2,10);state.directivos.push({_id:uid(),dni,nombres,ap,am,telefono:tel,correo,cargoId,region,linkCode:lc,registradoPor:null,password:pass});}
  dirModal=null;renderDirContent();toast(document.getElementById('dir-body'),'Directivo guardado');
}

      <button class="sim-btn-sm" style="background:#25d366;color:#fff;font-size:0.7rem;margin-left:0.2rem" onclick="toast(document.getElementById('inv-body'),'Abriendo WhatsApp...')">WhatsApp</button>

        if(col==='tel'){const n=c.querySelector(`input[data-ii="${i}"][data-ic="nombres"]`);n?.focus();}

      }
    });
  });
}
function invSave(){
  const d=window._currentDirectivo||state.directivos[0];if(!d)return;
  let created=0;
  invRows.forEach(r=>{
    if(r.tel.length>=9&&r.status!=='saved'&&r.status!=='dup'){
      if(state.invitaciones.find(i=>i.telefono===r.tel&&i.invitadoPor===d.dni)){r.status='dup';return;}
      state.invitaciones.push({_id:uid(),telefono:r.tel,nombres:r.nombres,invitadoPor:d.dni,linkCode:d.linkCode,estado:'pendiente'});
      r.status='saved';created++;
    }
  });
  renderInvContent();
  const res=document.getElementById('inv-result');
  if(res)res.innerHTML=`<div class="sim-success" style="margin-bottom:0.5rem">${created} invitacion${created!==1?'es':''} registrada${created!==1?'s':''}</div>`;
}

function arVerifyPhone(){
  arTel=(document.getElementById('ar-tel')?.value||'').replace(/\D/g,'');
  const err=document.getElementById('ar-tel-error');
  if(arTel.length<9){err.style.display='block';err.textContent='Ingrese un numero de al menos 9 digitos.';return;}
  // Check invitation
  const inv=state.invitaciones.find(i=>i.telefono===arTel&&i.linkCode===arDirectivo.linkCode);
  if(!inv){
    // Allow demo anyway but show note
    err.style.display='block';err.textContent='No encontramos tu invitacion. Para la demo, continuaremos de todas formas.';
    setTimeout(()=>{arStep='form';renderARContent();},1500);
    return;
  }
  if(inv.estado==='registrado'){err.style.display='block';err.textContent='Este numero ya se registro como personero.';return;}
  arStep='form';renderARContent();
}

function arLookupDni(){
  const dni=(document.getElementById('ar-dni')?.value||'').replace(/\D/g,'');
  arForm.dni=dni;
  const st=document.getElementById('ar-dni-status');
  if(!/^\d{8}$/.test(dni)){st.innerHTML='<span style="color:#dc2626">DNI debe tener 8 digitos</span>';return;}
  st.innerHTML='<span style="color:#2563eb">⏳ Consultando...</span>';
  setTimeout(()=>{
    const r=lookupDni(dni);
    arForm.nombres=r.nombres;arForm.ap=r.ap;arForm.am=r.am;
    document.getElementById('ar-nombres').value=r.nombres;
    document.getElementById('ar-ap').value=r.ap;
    document.getElementById('ar-am').value=r.am;
    st.innerHTML='<span style="color:#16a34a">✓ Datos encontrados</span>';
  },500);
}

function arSubmit(){
  const dni=document.getElementById('ar-dni')?.value||'';
  const nombres=document.getElementById('ar-nombres')?.value||'';
  const ap=document.getElementById('ar-ap')?.value||'';
  const am=document.getElementById('ar-am')?.value||'';
  const correo=document.getElementById('ar-correo')?.value||'';
  const err=document.getElementById('ar-form-error');
  if(!/^\d{8}$/.test(dni)||!nombres||!ap){err.style.display='block';err.textContent='DNI, nombres y apellido paterno requeridos';return;}
  if(!correo||!correo.includes('@')){err.style.display='block';err.textContent='Correo electronico requerido';return;}
  // Create personero
  if(!state.personeros.find(p=>p.dni===dni)){
    state.personeros.push({_id:uid(),dni,nombres,apellidoPaterno:ap,apellidoMaterno:am,telefono:arTel,correo,assignmentStatus:'pendiente',assignedMesa:null});
  }
  // Mark invitation
  const inv=state.invitaciones.find(i=>i.telefono===arTel&&i.linkCode===arDirectivo.linkCode);
  if(inv)inv.estado='registrado';
  // Create WhatsApp messages
  state.mensajes.push({tipo:'notificacion_invitador',dest:arDirectivo.telefono||'',msg:`${nombres} ${ap} se ha registrado como personero!`});
  state.mensajes.push({tipo:'bienvenida_invitado',dest:arTel,msg:`Bienvenido/a ${nombres}! Te has registrado como personero.`});
  arStep='success';renderARContent();
}

window.filterMap=function(min,max){
  document.querySelectorAll('.map-dot').forEach(dot=>{
    const text=dot.getAttribute('onclick')||'';
    const match=text.match(/(\d+)%/);
    const pct=match?parseInt(match[1]):0;
    dot.style.opacity=(pct>=min&&pct<max)?'0.9':'0.15';
  });
};

        <div style="padding:0.5rem 0.75rem;border-bottom:1px solid #e2e8f0;font-size:0.85rem;font-weight:600;color:#1e293b">${ch.name} <span style="font-weight:400;color:#94a3b8;font-size:0.78rem">— ${ch.desc}</span></div>

        <div style="padding:0.5rem;border-top:1px solid #e2e8f0;display:flex;gap:0.4rem">
          <input class="sim-input" id="chat-input" placeholder="Escribe un mensaje..." style="flex:1;font-size:0.82rem;padding:0.4rem 0.6rem"/>
          <button class="sim-btn-sm" style="background:#2563eb;color:#fff" onclick="chatSend()">Enviar</button>
        </div>
      </div>
    </div>`;
  // Scroll to bottom
  const msgsDiv=document.getElementById('chat-msgs');
  if(msgsDiv)msgsDiv.scrollTop=msgsDiv.scrollHeight;
  // Bind enter key
  document.getElementById('chat-input')?.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();chatSend();}});
}

function chatSend(){
  const input=document.getElementById('chat-input');
  const text=input?.value?.trim();if(!text)return;
  const d=window._currentDirectivo||state.directivos[0];
  const user=d?d.nombres+' '+d.ap:'Tu';
  const cargo=d?state.cargos.find(c=>c._id===d.cargoId)?.nombre||'':'';
  const now=new Date();
  chatMessages.push({ch:chatChannel,user,cargo,text,time:now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'),avatar:'😊'});
  renderChatContent();
}

function renderReportes(el){
  // Generate report data from state
  const totalPersoneros=state.personeros.length||8;
  const dirCount=state.directivos.length||1;
  const invCount=state.invitaciones.length||5;
  const regCount=state.invitaciones.filter(i=>i.estado==='registrado').length||2;
  const convRate=invCount>0?Math.round(regCount/invCount*100):40;

  // Simulated weekly data
  const weeks=['Sem 1','Sem 2','Sem 3','Sem 4','Sem 5','Sem 6'];
  const weekData=[12,28,45,67,89,totalPersoneros||105];
  const maxW=Math.max(...weekData);

  // By directivo performance
  const dirPerf=state.directivos.length>0?state.directivos.map(d=>{
    const inv=state.invitaciones.filter(i=>i.invitadoPor===d.dni);
    const reg=inv.filter(i=>i.estado==='registrado');
    const cargo=state.cargos.find(c=>c._id===d.cargoId);
    return {name:d.nombres+' '+d.ap,cargo:cargo?.nombre||'',invited:inv.length,registered:reg.length,rate:inv.length>0?Math.round(reg.length/inv.length*100):0};
  }):[
    {name:'Juan Garcia',cargo:'Presidente',invited:15,registered:12,rate:80},
    {name:'Maria Rodriguez',cargo:'Coord. Regional',invited:28,registered:18,rate:64},
    {name:'Pedro Martinez',cargo:'Coord. Distrital',invited:22,registered:9,rate:41},
    {name:'Ana Fernandez',cargo:'Coord. Regional',invited:19,registered:14,rate:74},
  ];

  let barChart='';
  weekData.forEach((v,i)=>{
    const h=Math.round(v/maxW*140);
    barChart+=`<div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;flex:1">
      <span style="font-size:0.7rem;font-weight:600;color:#1e293b">${v}</span>
      <div style="width:100%;max-width:40px;height:${h}px;background:linear-gradient(180deg,#2563eb,#3b82f6);border-radius:4px 4px 0 0;transition:height 0.3s"></div>
      <span style="font-size:0.65rem;color:#94a3b8">${weeks[i]}</span>
    </div>`;
  });

  let perfRows='';
  dirPerf.sort((a,b)=>b.registered-a.registered).forEach((d,i)=>{
    const barW=d.invited>0?Math.round(d.registered/d.invited*100):0;
    perfRows+=`<tr>
      <td style="font-weight:500">${i+1}. ${d.name}</td>
      <td><span class="badge badge-b">${d.cargo}</span></td>
      <td style="text-align:center">${d.invited}</td>
      <td style="text-align:center;font-weight:600;color:#16a34a">${d.registered}</td>
      <td style="width:120px"><div style="display:flex;align-items:center;gap:0.3rem"><div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="width:${barW}%;height:100%;background:${barW>=60?'#16a34a':barW>=40?'#eab308':'#dc2626'};border-radius:4px"></div></div><span style="font-size:0.72rem;font-weight:600;color:${barW>=60?'#16a34a':barW>=40?'#eab308':'#dc2626'}">${d.rate}%</span></div></td>
    </tr>`;
  });

  // Donut chart for status
  const statuses=[
    {label:'Pendiente',count:Math.round(totalPersoneros*0.4),color:'#f59e0b'},
    {label:'Asignado',count:Math.round(totalPersoneros*0.3),color:'#10b981'},
    {label:'Confirmado',count:Math.round(totalPersoneros*0.2),color:'#8b5cf6'},
    {label:'Sin mesa',count:Math.round(totalPersoneros*0.1),color:'#94a3b8'},
  ];
  let donutOffset=0;
  let donutPaths='';
  const total=statuses.reduce((a,s)=>a+s.count,0)||1;
  statuses.forEach(s=>{
    const pct=s.count/total;
    const angle=pct*360;
    const rad=d=>d*Math.PI/180;
    const r=50;
    const x1=60+r*Math.sin(rad(donutOffset));
    const y1=60-r*Math.cos(rad(donutOffset));
    const x2=60+r*Math.sin(rad(donutOffset+angle));
    const y2=60-r*Math.cos(rad(donutOffset+angle));
    const large=angle>180?1:0;
    donutPaths+=`<path d="M60,60 L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${s.color}" opacity="0.85"/>`;
    donutOffset+=angle;
  });

  let statusLegend='';
  statuses.forEach(s=>{
    statusLegend+=`<div style="display:flex;align-items:center;gap:0.3rem;font-size:0.78rem"><span style="width:10px;height:10px;border-radius:2px;background:${s.color};display:inline-block"></span>${s.label}: <strong>${s.count}</strong></div>`;
  });

  el.innerHTML=`
  <h2 class="doc-title">13. Reportes Analiticos (Propuesta)</h2>
  <p class="doc-text">Metricas de rendimiento por directivo, tendencias de registro y distribucion de estados. Permite identificar que directivos son mas efectivos en la convocatoria.</p>
  <div class="doc-step"><b>1</b> Revise el <strong>grafico de tendencia</strong> para ver el crecimiento semanal de registros.</div>
  <div class="doc-step"><b>2</b> Consulte el <strong>ranking de directivos</strong> para ver quien tiene mejor tasa de conversion.</div>
  <div class="doc-step"><b>3</b> Use el boton <strong>"Exportar PDF"</strong> para descargar el reporte.</div>

  <div class="demo-frame">
    <div class="demo-header"><span>DEMO INTERACTIVA</span><span>Propuesta: Reportes</span></div>
    <div class="demo-body" id="report-body">
      <div class="sim-layout">
        ${adminSidebar('reportes')}
        <div class="sim-main">
          <div class="sim-topbar">Dashboard › <strong>Reportes Analiticos</strong></div>
          <div class="sim-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
              <h3 style="margin:0">Reportes Analiticos</h3>
              <button class="sim-btn-sm" style="background:#dc2626;color:#fff" onclick="toast(document.getElementById('report-body'),'Generando PDF...')">📄 Exportar PDF</button>
            </div>

            <!-- KPIs -->
            <div class="sim-stats">
              <div class="sim-stat"><div class="num" style="font-size:1.3rem">${totalPersoneros}</div><div class="lbl">Personeros</div></div>
              <div class="sim-stat"><div class="num" style="font-size:1.3rem">${dirCount}</div><div class="lbl">Directivos</div></div>
              <div class="sim-stat"><div class="num" style="font-size:1.3rem">${invCount}</div><div class="lbl">Invitaciones</div></div>
              <div class="sim-stat"><div class="num" style="font-size:1.3rem;color:${convRate>=50?'#16a34a':'#d97706'}">${convRate}%</div><div class="lbl">Tasa Conversion</div></div>
            </div>

            <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap">
              <!-- Bar chart -->
              <div style="flex:1;min-width:280px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem">
                <div style="font-size:0.85rem;font-weight:600;color:#1e293b;margin-bottom:0.5rem">Registros por Semana</div>
                <div style="display:flex;align-items:flex-end;gap:0.3rem;height:170px;padding-top:10px">
                  ${barChart}
                </div>
              </div>

              <!-- Donut chart -->
              <div style="min-width:200px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem">
                <div style="font-size:0.85rem;font-weight:600;color:#1e293b;margin-bottom:0.5rem">Estado de Personeros</div>
                <div style="display:flex;align-items:center;gap:0.75rem">
                  <svg viewBox="0 0 120 120" style="width:100px;height:100px">${donutPaths}<circle cx="60" cy="60" r="28" fill="#fff"/><text x="60" y="63" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#1e293b">${total}</text></svg>
                  <div style="display:flex;flex-direction:column;gap:0.25rem">${statusLegend}</div>
                </div>
              </div>
            </div>

            <!-- Performance table -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem;margin-top:1rem">
              <div style="font-size:0.85rem;font-weight:600;color:#1e293b;margin-bottom:0.5rem">Ranking de Directivos por Efectividad</div>
              <div class="sim-tw"><table class="sim-t"><thead><tr>
                <th>Directivo</th><th>Cargo</th><th style="text-align:center">Invitados</th><th style="text-align:center">Registrados</th><th>Conversion</th>
              </tr></thead><tbody>${perfRows}</tbody></table></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}
